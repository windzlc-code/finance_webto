upstream finance_upstream {
    server finance:80;
}

upstream bankclub_upstream {
    server bankclub:3000;
}

upstream backadmin_upstream {
    server backadmin:8788;
}

server {
    listen 8080;
    server_name _;

    location = /admin {
        return 308 /admin/;
    }

    location ^~ /admin/ {
        proxy_pass http://backadmin_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin.html {
        return 308 /admin/;
    }

    location ^~ /api/ {
        proxy_pass http://backadmin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /tfse/api/ {
        proxy_pass http://backadmin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /tfse {
        return 308 /tfse/;
    }

    location ^~ /tfse/ {
        proxy_pass http://finance_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://bankclub_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
