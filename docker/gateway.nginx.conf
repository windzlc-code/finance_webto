upstream finance_upstream {
    server finance:80;
}

upstream backadmin_upstream {
    server backadmin:8788;
}

server {
    listen 8080;
    server_name _;

    # Resolve the Bank Club container on every deployment instead of retaining
    # an old Docker IP after its image is rebuilt.
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $bankclub_backend bankclub:3000;
    set $valuation_backend bankclub:5606;

    location = /admin {
        return 308 /admin/;
    }

    location ^~ /admin/ {
        proxy_pass http://backadmin_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /admin.html {
        return 308 /admin/;
    }

    location = /valuation {
        return 308 /valuation/;
    }

    location ^~ /valuation/ {
        rewrite ^/valuation/(.*)$ /$1 break;
        proxy_pass http://$valuation_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/lvr/ {
        proxy_pass http://$valuation_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/support/ {
        proxy_pass http://$valuation_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/minimax/ {
        proxy_pass http://$valuation_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/real-price/ {
        proxy_pass http://$valuation_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/geocode/ {
        proxy_pass http://$valuation_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/cathay/ {
        proxy_pass http://$valuation_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/tgos/ {
        proxy_pass http://$valuation_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Bank Club public routes must reach Next.js first. The Next lead route
    # persists the full application and mirrors its CRM summary to backadmin.
    location = /api/leads {
        proxy_pass http://$bankclub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/events {
        proxy_pass http://$bankclub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/files/ {
        proxy_pass http://$bankclub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /api/ {
        proxy_pass http://backadmin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ^~ /tfse/api/ {
        proxy_pass http://backadmin_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /tfse {
        return 308 /tfse/;
    }

    location ^~ /tfse/ {
        proxy_pass http://finance_upstream/;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://$bankclub_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
