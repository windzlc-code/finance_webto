<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>TGOS 批次定位匯入</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    body{background:#edf2f5}.tgos-page{width:min(1100px,100% - 24px);margin:0 auto;padding:18px 0 28px}.tgos-grid{display:grid;grid-template-columns:repeat(12,minmax(0,1fr));gap:10px}.tgos-grid .field{grid-column:span 3}.tgos-grid .wide{grid-column:span 6}.tgos-actions{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px;margin-top:10px}.tgos-log{min-height:260px;max-height:520px;overflow:auto;white-space:pre-wrap;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.tgos-status-bar{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px;margin-top:10px}.tgos-status-bar div{padding:10px;border:1px solid var(--line);border-radius:8px;background:#fff}.tgos-status-bar strong{display:block;color:#d64045;font-size:24px}.tgos-status-bar span{font-size:12px;color:#667085;font-weight:900}@media (max-width:760px){.tgos-grid .field,.tgos-grid .wide{grid-column:span 12}.tgos-actions,.tgos-status-bar{grid-template-columns:1fr}}
  </style>
</head>
<body>
  <main class="tgos-page stack">
    <section class="panel">
      <div class="panel-head">
        <h2>TGOS 批次定位匯入</h2>
        <div class="panel-note">以 TGOS 瀏覽器地址定位寫回本機 geocode_cache</div>
      </div>
      <div class="panel-body">
        <div class="tgos-grid">
          <div class="field">
            <label for="importLimit">先搬 Open Data 筆數</label>
            <input id="importLimit" type="number" min="1" max="500" value="100" />
          </div>
          <div class="field">
            <label for="batchLimit">每批定位筆數</label>
            <input id="batchLimit" type="number" min="1" max="100" value="20" />
          </div>
          <div class="field">
            <label for="delayMs">每筆延遲 ms</label>
            <input id="delayMs" type="number" min="200" step="100" value="1200" />
          </div>
          <div class="field">
            <label for="cityFilter">縣市</label>
            <input id="cityFilter" placeholder="例如：台北市" />
          </div>
          <div class="field">
            <label for="districtFilter">行政區</label>
            <input id="districtFilter" placeholder="例如：信義區" />
          </div>
          <div class="field">
            <label for="transactionType">交易型態</label>
            <select id="transactionType">
              <option value="">買賣 + 預售</option>
              <option value="sale">買賣</option>
              <option value="presale">預售</option>
            </select>
          </div>
          <div class="field wide">
            <label for="minSourceId">Open Data 起始 id</label>
            <input id="minSourceId" type="number" min="0" value="0" />
          </div>
        </div>
        <div class="tgos-actions">
          <button id="loadTgosBtn" type="button" class="btn btn-ghost">載入 TGOS</button>
          <button id="importPendingBtn" type="button" class="btn btn-ghost">先搬一批待定位資料</button>
          <button id="startBtn" type="button" class="btn btn-main">開始 TGOS 定位寫回</button>
        </div>
        <div class="tgos-actions">
          <button id="stopBtn" type="button" class="btn btn-ghost">停止</button>
          <button id="refreshPendingBtn" type="button" class="btn btn-ghost">查看待定位清單</button>
          <a class="btn btn-ghost" style="display:grid;place-items:center;text-decoration:none" href="../">回主系統</a>
        </div>
        <div id="message" class="msg warn">請先載入 TGOS；若 Lite 金鑰未提供地址定位服務，請設定正式 TGOS_APP_ID / TGOS_API_KEY 後重啟本機服務。</div>
        <div class="tgos-status-bar">
          <div><strong id="pendingCount">0</strong><span>本批待處理</span></div>
          <div><strong id="okCount">0</strong><span>成功</span></div>
          <div><strong id="failCount">0</strong><span>失敗</span></div>
          <div><strong id="lastSourceId">0</strong><span>最後搬入 Open Data id</span></div>
        </div>
        <div id="log" class="log tgos-log">尚未開始。</div>
      </div>
    </section>
  </main>
  <script src="tgos_geocode_importer.js"></script>
</body>
</html>
